markdown_extensions:
# Now ready for FontAwesome https://fontawesome.com/icons?d=gallery&m=free
# : fa-link: :octicons-link: :fontawesome-solid-link:
# : fa-external-link: :octicons-link-external: :fontawesome-solid-external-link-alt:
# : fa-plus-square: :octicons-diff-added: :fontawesome-regular-plus-square:
    - pymdownx.emoji:
#        emoji_index: !!python/name:materialx.emoji.twemoji
#        emoji_generator: !!python/name:materialx.emoji.to_svg
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - admonition
    - pymdownx.details
# See https://github.com/squidfunk/mkdocs-material/discussions/3427
# and https://github.com/flynneva/mkdocs-custom-superfence-example
    - pymdownx.superfences:
        custom_fences:
            - name: '*'
              class: '*'
              format: !!python/name:superfences_examples.prefix.formatter
              validator: !!python/name:superfences_examples.prefix.validator
    - codehilite
    - toc:
        permalink: true
        title: On this page
    - pymdownx.keys
    - pymdownx.mark
# Extras, https://pypi.org/project/mkdocs-pymdownx-material-extras/
# pip install mkdocs-pymdownx-material-extras
    - pymdownx.smartsymbols
    - pymdownx.critic
    - pymdownx.tabbed:
        alternate_style: true
    - attr_list
    - pymdownx.caret
    - pymdownx.tilde
    - smarty
    - pymdownx.mark
#    - fontawesome_markdown

plugins:
# If plugins: added, - search needs to be specified
    - search
# pip install "mkdocs-material[imaging]"
    - social
#     - social:
#          cards_dir: Cards
# To check progress, https://pypi.org/project/mkdocs-plugin-progress/
# pip install mkdocs-plugin-progress
    - progress
# To define variables, https://pypi.org/project/mkdocs-macros-plugin/
# pip install mkdocs-macros-plugin
    - macros
#    - enumerate-headings:
#        toc_depth: 1
#        strict: true
# # To check external links
#     - htmlproofer
# To add revision date
# https://pypi.org/project/mkdocs-git-revision-date-localized-plugin/
    - git-revision-date-localized:
        # type: timeago
        custom_format: "%d. %B %Y"
        timezone: Europe/Amsterdam
        locale: en
        fallback_to_build_date: false
        enable_creation_date: true
        exclude:
            - index.md
        enabled: true
        strict: true
