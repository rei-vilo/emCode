markdown_extensions:
# --- Now ready for FontAwesome https://fontawesome.com/icons?d=gallery&m=free
# : fa-link: :octicons-link: :fontawesome-solid-link:
# : fa-external-link: :octicons-link-external: :fontawesome-solid-external-link-alt:
# : fa-plus-square: :octicons-diff-added: :fontawesome-regular-plus-square:
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - admonition
    - pymdownx.details
# See https://github.com/squidfunk/mkdocs-material/discussions/3427
# and https://github.com/flynneva/mkdocs-custom-superfence-example
# Install with 
# git clone https://github.com/flynneva/mkdocs-custom-superfence-example
# ~/.venvs/mkdocs/bin/python -m pip install mkdocs-custom-superfence-example
# or
# cd mkdocs-custom-superfence-example
# ~/.venvs/mkdocs/bin/python setup.py build
# ~/.venvs/mkdocs/bin/python setup.py install
# The extension is archived.
#    - pymdownx.superfences
    - pymdownx.superfences:
        custom_fences:
            - name: '*'
              class: '*'
              format: !!python/name:superfences_examples.prefix.formatter
              validator: !!python/name:superfences_examples.prefix.validator
    - codehilite
    - toc:
        permalink: true
        title: On this page
    - pymdownx.keys
    - pymdownx.mark
# Extras, https://pypi.org/project/mkdocs-pymdownx-material-extras/
# ~/.venvs/mkdocs/bin/python -m pip install mkdocs-pymdownx-material-extras
    - pymdownx.smartsymbols
    - pymdownx.critic
    - pymdownx.tabbed:
        alternate_style: true
    - attr_list
    - pymdownx.caret
    - pymdownx.tilde
    - smarty
    - pymdownx.mark
    - def_list
    - pymdownx.highlight
#     - markdown.extensions.footnotes
#     - pymdownx.inlinehilite
#     - pymdownx.snippets
#     - mdx_math
# See https://gitlab.com/rod2ik/mkdocs-graphviz
# ~/.venvs/mkdocs/bin/python -m pip install mkdocs-graphviz
# Requires extra_javascript:
#     - mkdocs_graphviz

