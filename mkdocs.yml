theme:
#    name: readthedocs
#    name: windmill
    name: 'material'
# Template is located at /home/reivilo/.local/lib/python3.9/site-packages/material
# Template is located at /home/reivilo/.venvs/mkdocs/lib/python3.11/site-packages/material
# Copy relevant files under theme or theme/partials
# Comment to remove announcement, edit announce.html
    custom_dir: theme
#
# For GDPR concerns, false=avoid Google fonts
    font: false
# or use Ubuntu fonts
#    font:
#        text: 'Ubuntu'
#        code: 'Ubuntu Mono'
    palette:
       - scheme: default
         primary: red
         accent: pink
         toggle:
            icon: material/brightness-7
            # icon: material/toggle-switch-off-outline
            name: Switch to dark mode
       - scheme: slate
         primary: red
         accent: pink
         toggle:
            icon: material/brightness-4
            # icon: material/toggle-switch
            name: Switch to light mode
    features:
        - content.code.copy
        - navigation.footer
        - navigation.indexes
        - navigation.top
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky
#        - navigation.path
#        - navigation.sections
        - content.code.annotate

# --- Announcement banner
# Update theme/base.html with /home/reivilo/.venvs/mkdocs/lib64/python3.11/site-packages/material
# Uncomment the two following lines
#        - header.autohide
        - announce.dismiss
#        instant: true

# --- Search
        - search.suggest
#        - search.highlight
        - search.share

# --- Logo and favicon
    logo: img/Logo-256-eC-Website-white.png
    favicon: img/favicon.ico

extra_css:
    - css/extra.css

