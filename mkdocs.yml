theme:
#    name: readthedocs
#    name: windmill
    name: 'material'
#    custom_dir: theme
#
    palette:
       - scheme: default
         primary: red
         accent: pink
         toggle:
            icon: material/brightness-7
            # icon: material/toggle-switch-off-outline
            name: Switch to dark mode
       - scheme: slate
         primary: red
         accent: pink
         toggle:
            icon: material/brightness-4
            # icon: material/toggle-switch
            name: Switch to light mode
#    features:
#        - header.autohide
#        - tabs
#        instant: true
# Solution from Add support for sections with pages #1008
# https://github.com/squidfunk/mkdocs-material/issues/1008
#    section_page_name: chapter_page

    logo: img/Logo-256-eC-Website-white.png
    favicon: img/favicon.ico
    features:
        - content.code.copy
        - navigation.footer
        - navigation.indexes
        - navigation.top
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky
#        - navigation.sections
        - content.code.annotate
# Search
        - search.suggest
#        - search.highlight
        - search.share
# For GDPR concerns, false=avoid Google fonts
    font: false
